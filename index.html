<!DOCTYPE html>
<html>
	<head>
		<title>Fancify Shamcify</title>

		<!-- link to your script file here -->
		<script src="fancifymytext.js" defer></script>
		
	</head>

	<body>
		<h1>Fancify my Text</h1>
		<!-- Your UI controls go here -->
		<fieldset>
			<legend>
				<strong>Text</strong>
			</legend>
			<textarea rows = "4" cols= "30" id="TextField">
			</textarea>
		</fieldset>
		
		<fieldset>
			<legend>
				<strong>Fancify</strong>
			</legend>
			<div>
			<input type="radio" name="fancify" id="Fancy" value="fancy" onchange="toggleFancify(value)"/>
			<label for="Fancy">FancySchmancy</label>

			<input type="radio" name="fancify" id="Boring" value="boring" checked onchange="toggleFancify(value)"/>
			<label for="Boring">BoringBetty</label>
			</div>
			
			<button type= "button" id="Bigger" onclick="enlargeText()">Bigger!</button>
			<button type= "button" id="Moo" onclick="addMoo()">Moo?</button>
		</fieldset>

	</body>
</html>
